<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lift KKTM Kemaman</title>

<style>
body { font-family: Arial; text-align: center; background:#f2f2f2; }
h1 { margin-top: 40px; }
button {
  display:block; width:80%; max-width:300px; margin:12px auto;
  padding:15px; font-size:18px; border-radius:10px;
  background:green; color:white; border:none;
}
.hidden { display:none; }
.msg { color:red; }
</style>
</head>

<body>

<h1>Lift KKTM Kemaman</h1>

<div id="denied" class="hidden">
  <h2>Access Denied ❌</h2>
  <p>Scan NFC again</p>
</div>

<div id="page1" class="hidden">
  <h2>Select Current Floor</h2>
  <button onclick="setCurrent(1)">Floor 1</button>
  <button onclick="setCurrent(2)">Floor 2</button>
  <button onclick="setCurrent(3)">Floor 3</button>
  <button onclick="setCurrent(4)">Floor 4</button>
</div>

<div id="page2" class="hidden">
  <h2>Select Destination</h2>
  <div id="msg" class="msg"></div>
  <button onclick="sendData(1)">Floor 1</button>
  <button onclick="sendData(2)">Floor 2</button>
  <button onclick="sendData(3)">Floor 3</button>
  <button onclick="sendData(4)">Floor 4</button>
</div>

<div id="result" class="hidden">
  <h2>Lift is moving 🚀</h2>
</div>

<script>
let currentFloor = null;
let allowed = false;

const params = new URLSearchParams(window.location.search);
if(params.get("access") === "1") allowed = true;

if(allowed){
  document.getElementById("page1").classList.remove("hidden");
}else{
  document.getElementById("denied").classList.remove("hidden");
}

function setCurrent(floor){
  currentFloor = floor;
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}

function sendData(destination){

  if(currentFloor == null){
    document.getElementById("msg").innerText = "Select current floor first!";
    return;
  }

  if(currentFloor == destination){
    document.getElementById("msg").innerText = "Already on this floor!";
    return;
  }

  fetch("https://smart-lift-using-nfc-default-rtdb.asia-southeast1.firebasedatabase.app/Lift.json", {
    method: "PUT",
    body: JSON.stringify({
      from: currentFloor,
      to: destination,
      time: Date.now()
    })
  })
  .then(() => {
    document.getElementById("page2").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
  });
}
</script>

</body>
</html>
