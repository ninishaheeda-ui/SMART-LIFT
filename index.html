<script>
function sendData(from, to){

    fetch("https://smart-lift-using-nfc-default-rtdb.asia-southeast1.firebasedatabase.app/lift.json", {
        method: "PUT",
        body: JSON.stringify({
            from: from,
            to: to,
            time: Date.now()
        })
    });

    document.body.innerHTML = "<h2>Your lift will arrive shortly 🚀</h2>";
}
</script>
