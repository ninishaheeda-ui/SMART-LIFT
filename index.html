<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lift KKTM Kemaman</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-size: 24px;
    margin-top: 20px;
}

h2 {
    font-size: 18px;
    color: #555;
}

button {
    width: 100%;
    padding: 20px;
    margin: 10px 0;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
}

button:active {
    background: #45a049;
}
</style>

</head>

<body>

<div class="container">
    <h1>Lift KKTM Kemaman</h1>
    <h2>Select Your Current Floor</h2>

    <button onclick="goNext(1)">Floor 1</button>
    <button onclick="goNext(2)">Floor 2</button>
    <button onclick="goNext(3)">Floor 3</button>
    <button onclick="goNext(4)">Floor 4</button>
</div>

<script>
function goNext(floor){
    localStorage.setItem("currentFloor", floor);
    window.location.href = "destination.html";
}
</script>

</body>
</html>
