<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lift KKTM Kemaman</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
    margin: 0;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

button {
    width: 100%;
    padding: 20px;
    margin: 10px 0;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">

    <h1>Lift KKTM Kemaman</h1>

    <!-- STEP 1 -->
    <div id="step1">
        <h2>Select Your Current Floor</h2>
        <button onclick="setCurrent(1)">Floor 1</button>
        <button onclick="setCurrent(2)">Floor 2</button>
        <button onclick="setCurrent(3)">Floor 3</button>
        <button onclick="setCurrent(4)">Floor 4</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">
        <h2>Select Destination Floor</h2>
        <button onclick="send(1)">Floor 1</button>
        <button onclick="send(2)">Floor 2</button>
        <button onclick="send(3)">Floor 3</button>
        <button onclick="send(4)">Floor 4</button>
    </div>

</div>

<script>
let currentFloor = 0;

function setCurrent(floor){
    currentFloor = floor;

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

function send(destination){
    alert("From Floor " + currentFloor + " → Go to Floor " + destination);

    // nanti boleh connect ESP32 sini
    // contoh:
    // fetch("http://192.168.4.1/go?from=" + currentFloor + "&to=" + destination);
}
</script>

</body>
</html>
